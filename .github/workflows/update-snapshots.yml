name: Update Visual Snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Regenerate snapshots on Linux
        run: pytest -m ci --update-snapshots

      - name: Commit snapshot updates
        run: |
          git -c user.name="hmik2003" -c user.email="hmik2003@users.noreply.github.com" add tests/**/*-snapshots/
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git -c user.name="hmik2003" -c user.email="hmik2003@users.noreply.github.com" commit -m "Update visual snapshot baselines from Linux CI"
            git push
          fi
